<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal La Salle | Inicio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
    <div id="login-screen" class="login-container">
        <div class="login-header">
            <div class="star-logo">★</div>
            <h1>Colegio La Salle</h1>
            <p>Acceso a Gestión Curricular</p>
        </div>
        <div class="login-form">
            <input type="text" id="user" placeholder="Usuario">
            <input type="password" id="pass" placeholder="Contraseña">
            <button class="btn-primary" onclick="validar()">ENTRAR</button>
            <p id="error" class="error-msg">Credenciales incorrectas.</p>
        </div>
    </div>

    <div id="portal-content" class="portal-selection" style="display:none">
        <div class="star-logo small">★</div>
        <h2 id="welcome-msg"></h2>
        <div class="grid-grados">
            <button class="btn-grado" onclick="ir(1)">1° Primaria</button>
            <button class="btn-grado" onclick="ir(2)">2° Primaria</button>
            <button class="btn-grado" onclick="ir(3)">3° Primaria</button>
            <button class="btn-grado" onclick="ir(4)">4° Primaria</button>
            <button class="btn-grado" onclick="ir(5)">5° Primaria</button>
            <button class="btn-grado" onclick="ir(6)">6° Primaria</button>
        </div>
        <button class="btn-logout-red" onclick="cerrarSesion()">Cerrar Sesión</button>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
