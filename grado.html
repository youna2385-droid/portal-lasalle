<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Grado | La Salle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-body">
    <aside class="sidebar">
        <h2 id="gradoTitle">Grado</h2>
        <div id="userDisplay" class="user-tag"></div>
        <div class="nav-group">
            <span class="nav-label">Configuración</span>
            <button class="nav-btn active" onclick="show('config', this)">👥 Alumnos</button>
        </div>
        <div class="nav-group">
            <span class="nav-label">Planificación</span>
            <button class="nav-btn" onclick="show('edas', this)">🏗️ Mis EDAs</button>
        </div>
        <div class="nav-group">
            <span class="nav-label">Evaluación</span>
            <button class="nav-btn" onclick="show('sesiones', this)">🏃 Sesiones y Archivos</button>
            <button class="nav-btn" onclick="show('final', this); renderRegistroFinal()">📊 Registro Notas</button>
        </div>
        <div style="margin-top: auto; display: flex; flex-direction: column; gap: 10px;">
            <button onclick="window.location.href='index.html'" class="btn-nav-home">🏠 Inicio</button>
            <button onclick="cerrarSesion()" class="btn-nav-exit">🔒 Salir</button>
        </div>
    </aside>

    <main class="main">
        <div class="welcome-banner"><h3 id="txt-saludo"></h3></div>

        <div id="config" class="section active">
            <h1>Nómina del Grado</h1>
            <div class="card">
                <textarea id="lista-nombres" placeholder="Nombres de alumnos (uno por línea)..."></textarea>
                <button class="btn-save-all" onclick="guardarNomina()">💾 Sincronizar Alumnos</button>
            </div>
        </div>

        <div id="edas" class="section">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h1>Experiencias (EDAs)</h1>
                <button class="btn-add" onclick="nuevaEda()">+ Nueva EDA</button>
            </div>
            <div id="contenedor-edas"></div>
        </div>

        <div id="sesiones" class="section">
            <h1>Sesiones y Evidencias</h1>
            <div id="contenedor-sesiones-por-eda"></div>
        </div>

        <div id="final" class="section">
            <h1>Registro Auxiliar Sincronizado</h1>
            <div class="card" style="overflow-x: auto;">
                <table><thead id="head-final"></thead><tbody id="body-final"></tbody></table>
            </div>
        </div>
    </main>
    <script type="module" src="script.js"></script>
</body>
</html>
