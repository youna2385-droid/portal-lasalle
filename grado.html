<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Grado | La Salle</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <img src="logo.png" alt="Logo La Salle" class="logo-sidebar">
        <h2 id="gradoTitle" style="text-align:center; color: #ffc107; margin-top:0;">Cargando...</h2>
        <div id="userDisplay" style="text-align:center; font-size: 0.8rem; margin-bottom: 20px; opacity: 0.7;"></div>
        
        <nav class="nav-group">
            <span class="nav-label">Menú de Gestión</span>
            <button class="nav-btn active" id="btn-config" onclick="window.cambiarPestana('config', this)">👥 Lista Alumnos</button>
            <button class="nav-btn" id="btn-plan" onclick="window.cambiarPestana('plan', this)">📄 Plan Anual</button>
            <button class="nav-btn" id="btn-edas" onclick="window.cambiarPestana('edas', this)">🏗️ Mis EDAs</button>
            <button class="nav-btn" id="btn-sesiones" onclick="window.cambiarPestana('sesiones', this)">🏃 Sesiones/Docs</button>
        </nav>

        <div class="sidebar-footer" style="margin-top: auto; padding-top: 20px;">
            <button onclick="window.location.href='index.html'" class="btn-nav-home" style="width:100%; margin-bottom:10px; cursor:pointer;">🏠 Inicio</button>
            <button onclick="window.cerrarSesion()" class="btn-nav-exit" style="width:100%; cursor:pointer;">🔒 Salir</button>
        </div>
    </aside>

    <main class="main">
        <div id="txt-saludo" class="welcome-banner">Cargando datos...</div>

        <section id="config" class="section active">
            <div class="card">
                <h2>Nómina de Estudiantes</h2>
                <p>Ingrese los nombres (uno por línea):</p>
                <textarea id="lista-nombres" placeholder="Nombres..."></textarea>
                <button class="btn-primary" onclick="window.guardarNomina()">💾 Sincronizar Alumnos</button>
            </div>
        </section>

        <section id="plan" class="section" style="display:none;">
            <div class="card">
                <h2>Plan Anual Curricular</h2>
                <p>Suba el archivo principal del grado:</p>
                <input type="file" onchange="window.subirPlan(this)">
                <div id="status-plan" style="margin-top:20px;"></div>
            </div>
        </section>

        <section id="edas" class="section" style="display:none;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                <h1>Experiencias de Aprendizaje</h1>
                <button class="btn-add" onclick="window.nuevaEda()">+ Crear Nueva EDA</button>
            </div>
            <div id="contenedor-edas"></div>
        </section>

        <section id="sesiones" class="section" style="display:none;">
            <h1>Sesiones de Clase y Archivos</h1>
            <div id="contenedor-sesiones-por-eda"></div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
